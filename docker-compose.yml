services:
  db:
    image: postgres:15-alpine
    container_name: mcp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: ${POSTGRES_DB:-appointment_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mcp_server
    restart: unless-stopped
    command: python mcp_server.py
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    ports:
      - "8001:8001"
    depends_on:
      - db

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mcp_api
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - MCP_SERVER_URL=http://mcp-server:8001/sse
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mcp-server

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: mcp_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata: